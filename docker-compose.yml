# The canonical local stack (Artifact 04). `docker compose up --build` from a clean checkout is
# the per-story verification gate — it must need nothing but Docker.
#
# Root-level because it spans both peers' concerns and the whole local environment.

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-largata}
      POSTGRES_USER: ${POSTGRES_USER:-largata}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-largata}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    # No volume, deliberately (spec Q6): data lives in the container's writable layer and dies
    # with `docker compose down`. "Redeploy = fresh DB" by construction — no flag to remember,
    # no cleanup step to forget. Ephemerality is a testing tool, so it lives where you test.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-largata} -d ${POSTGRES_DB:-largata}"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-largata}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-largata-local-dev}
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    # Container-only until S3.3 (spec Q1): no backend wiring, no bucket code, no storage client.
    # The healthcheck is what stops the config rotting silently while nothing uses it — compose
    # itself fails loudly if the emulator breaks.
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-largata}
      DATABASE_USERNAME: ${POSTGRES_USER:-largata}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-largata}
      PORT: 8080
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      # The backend does not talk to MinIO yet (S3.3), but the stack contract is "the whole local
      # environment is up" — so a broken emulator fails the stack rather than lurking.
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
